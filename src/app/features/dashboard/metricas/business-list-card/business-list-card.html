<div class="biz-list-card">
  <div class="biz-list-card__header">
    <div class="biz-list-card__title">Mis negocios</div>
    <div class="biz-list-card__count">{{ businesses.length }}</div>
  </div>

  <!-- Contador de publicados -->
  <div class="biz-list-card__pub-counter" [class.biz-list-card__pub-counter--full]="publishedCount >= MAX_PUBLISHED">
    <div class="biz-list-card__pub-bar">
      <div class="biz-list-card__pub-fill"
           [class.biz-list-card__pub-fill--full]="publishedCount >= MAX_PUBLISHED"
           [style.width.%]="(publishedCount / MAX_PUBLISHED) * 100"></div>
    </div>
    <span class="biz-list-card__pub-label">
      <strong>{{ publishedCount }}</strong> de {{ MAX_PUBLISHED }} publicados
      <ng-container *ngIf="publishedCount >= MAX_PUBLISHED"> · límite alcanzado</ng-container>
    </span>
  </div>

  <div class="biz-list-card__rows">
    <div
      *ngFor="let biz of businesses"
      class="biz-list-card__row"
      (click)="businessSelected.emit(biz)">
      <div class="biz-list-card__icon">
        <ng-icon name="heroBuildingStorefront" size="18"></ng-icon>
      </div>
      <div class="biz-list-card__info">
        <div class="biz-list-card__name">{{ biz.businessName }}</div>
        <div class="biz-list-card__cat">{{ biz.category }}{{ biz.address.colony ? ' · ' + biz.address.colony : '' }}</div>
      </div>
      <span class="biz-list-card__status" [ngClass]="statusClass(biz.status)">
        {{ statusLabel(biz.status) }}
      </span>
      <ng-icon name="heroChevronRight" size="16" class="biz-list-card__arrow"></ng-icon>
    </div>

    <div class="biz-list-card__row biz-list-card__row--add" (click)="addRequested.emit()">
      <div class="biz-list-card__add-icon">
        <ng-icon name="heroPlus" size="16"></ng-icon>
      </div>
      <span class="biz-list-card__add-label">Agregar negocio</span>
    </div>
  </div>
</div>
