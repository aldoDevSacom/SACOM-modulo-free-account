<div class="dashboard">
  <app-header
    [userName]="userName"
    (logoutEvent)="logout()">
  </app-header>
  <div class="dashboard__body">
    <app-nav-lateral class="dashboard__sidebar"></app-nav-lateral>
    <main class="dashboard__content">
      <router-outlet></router-outlet>
    </main>
  </div>
  <!-- Nav inferior solo en mobile -->
  <nav class="dashboard__bottom-nav">
    <a routerLink="/dashboard/metricas" routerLinkActive="dashboard__bottom-nav-item--active" class="dashboard__bottom-nav-item" title="Panel">
      <ng-icon name="heroChartBar" size="22"></ng-icon>
      <span>Panel</span>
    </a>
    <a routerLink="/dashboard/seguridad" routerLinkActive="dashboard__bottom-nav-item--active" class="dashboard__bottom-nav-item" title="Seguridad">
      <ng-icon name="heroLockClosed" size="22"></ng-icon>
      <span>Seguridad</span>
    </a>
  </nav>
</div>
