<div class="map-picker">
  <google-map
    [center]="center"
    [zoom]="zoom"
    [options]="mapOptions"
    height="256px"
    width="100%"
    (mapClick)="onMapClick($event)">
    <map-marker
      [position]="markerPosition"
      [options]="{ draggable: true }"
      (mapDragend)="onMarkerDragEnd($event)">
    </map-marker>
  </google-map>
</div>
